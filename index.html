<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Daily Whiz — Sign Up</title>
  <style>
    /* Styling remains the same as your beautiful design */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; }
    .container { max-width: 560px; margin: 0 auto; padding: 2rem 1rem; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 14px; border: 1px solid #ddd; border-radius: 99px; font-size: 13px; cursor: pointer; background: white; transition: 0.15s; }
    .chip.selected { background: #EEEDFE; border-color: #7F77DD; color: #3C3489; }
    .submit-btn { width: 100%; padding: 12px; background: #534AB7; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .success { text-align: center; padding: 3rem; display: none; }
  </style>
</head>
<body>

<div class="container" id="form-container">
  <div class="card">
    <label>Email address</label>
    <input type="email" id="email" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;" />
  </div>

  <div class="card">
    <div id="topic-chips" class="chip-group">
      <div class="chip" data-value="Science">Science</div>
      <div class="chip" data-value="Space">Space</div>
      <div class="chip" data-value="Animals">Animals</div>
      <div class="chip" data-value="Sports">Sports</div>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn">Subscribe</button>
</div>

<div class="success" id="success-msg">
  <h2>🎉 You're subscribed!</h2>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0nDZnYfTI5j15O9R73M123YxypRmKcrI",
    authDomain: "kidsnews-f9c81.firebaseapp.com",
    projectId: "kidsnews-f9c81",
    storageBucket: "kidsnews-f9c81.appspot.com",
    messagingSenderId: "35324641174",
    appId: "1:35324641174:web:710e147be9c55f4b5de7b7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Click handler for chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => chip.classList.toggle('selected');
  });

  document.getElementById('submit-btn').onclick = async () => {
    const email = document.getElementById('email').value;
    const topics = [...document.querySelectorAll('#topic-chips .selected')].map(c => c.dataset.value);

    await signInAnonymously(auth);
    const userRef = doc(db, 'artifacts', 'kids-news-explorer', 'users', auth.currentUser.uid, 'settings', 'preferences');
    
    await setDoc(userRef, { email, topics, createdAt: serverTimestamp() });
    document.getElementById('form-container').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  };
</script>
</body>
</html>
